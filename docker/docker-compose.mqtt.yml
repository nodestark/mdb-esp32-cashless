name: vmflow-mqtt

services:
  broker:
    image: eclipse-mosquitto:2.1.2-alpine
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT (TCP)
      - "9001:9001"   # WebSockets (opcional)
    volumes:
      - ./mqtt/config:/mosquitto/config
      - ./mqtt/config/acl:/etc/mosquitto/acl:ro
      - ./mqtt/data:/mosquitto/data

  domain:
    image: python:3.10-alpine
    restart: unless-stopped
    depends_on:
      - broker
    volumes:
      - ./mqtt/domain:/domain
    environment:
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      MQTT_HOST: broker
    command: sh -c "pip install --no-cache-dir supabase paho-mqtt && python -u /domain/mqtt_domain.py"
