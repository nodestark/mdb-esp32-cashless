<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VMflow Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e2e8f0;
      user-select: none;
    }
    h1 {
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      color: #10b981;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    canvas {
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      display: block;
      cursor: pointer;
    }
    #info {
      margin-top: 12px;
      font-size: 0.72rem;
      color: #475569;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<h1>⚡ VMflow Runner</h1>
<canvas id="c" width="800" height="260"></canvas>
<div id="info">SPACE / TAP → jump &nbsp;·&nbsp; double jump allowed</div>

<script>
const canvas = document.getElementById('c')
const ctx    = canvas.getContext('2d')

const W = canvas.width
const H = canvas.height

// Ground is fixed reference — everything aligns to this
const GY        = H - 55   // visual ground Y
const GRAVITY   = 0.55
const JUMP_V    = -12.5
const MIN_SPD   = 5
const MAX_SPD   = 14

// ── State ──────────────────────────────────────────────────
let state, player, obstacles, score, speed, frame, best, nextObstacle

function init() {
  state  = 'idle'
  score  = 0
  speed  = MIN_SPD
  frame  = 0
  best   = parseInt(localStorage.getItem('vmflow_best') || '0')
  nextObstacle = randomDelay()

  player = {
    x:        80,
    y:        GY,          // y = bottom of player
    w:        36,
    h:        48,
    vy:       0,
    jumps:    0,
    grounded: true
  }

  obstacles = []
}

function randomDelay() { return 70 + Math.floor(Math.random() * 90) }

// ── Stars ──────────────────────────────────────────────────
const STARS = Array.from({ length: 55 }, () => ({
  x: Math.random() * W,
  y: Math.random() * (GY - 30),
  r: Math.random() * 1.4 + 0.3,
  p: Math.random() * Math.PI * 2
}))

// ── Obstacles ──────────────────────────────────────────────
const OBS_TYPES = [

  // OUT OF ORDER — broken vending machine (red, tilted screen, cracks, warning triangle)
  {
    w: 38, h: 52,
    draw(ctx, x, y, w, h) {
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)'
      ctx.fillRect(x + 4, y + 5, w, h)
      // body
      ctx.fillStyle = '#7f1d1d'
      ctx.fillRect(x, y, w, h)
      ctx.fillStyle = '#ef4444'
      ctx.fillRect(x, y, w - 4, h - 4)
      // broken screen (cracked dark)
      ctx.fillStyle = '#1c0a0a'
      ctx.fillRect(x + 5, y + 6, w - 14, 14)
      // crack lines on screen
      ctx.strokeStyle = '#ef4444'
      ctx.lineWidth = 1
      ctx.beginPath()
      ctx.moveTo(x + 10, y + 6); ctx.lineTo(x + 14, y + 20)
      ctx.moveTo(x + 14, y + 12); ctx.lineTo(x + 20, y + 9)
      ctx.stroke()
      // warning triangle
      ctx.fillStyle = '#fbbf24'
      ctx.beginPath()
      ctx.moveTo(x + w / 2 - 8, y + 26)
      ctx.lineTo(x + w / 2 + 8, y + 26)
      ctx.lineTo(x + w / 2,     y + 11)
      ctx.closePath()
      ctx.fill()
      ctx.fillStyle = '#1c0a0a'
      ctx.font = 'bold 9px Courier New'
      ctx.textAlign = 'center'
      ctx.fillText('!', x + w / 2, y + 24)
      // coin slot broken
      ctx.fillStyle = '#7f1d1d'
      ctx.fillRect(x + 8, y + 32, w - 20, 3)
      // X buttons
      ctx.strokeStyle = '#fca5a5'
      ctx.lineWidth = 2
      ctx.beginPath()
      ctx.moveTo(x + 6,  y + 40); ctx.lineTo(x + 14, y + 48)
      ctx.moveTo(x + 14, y + 40); ctx.lineTo(x + 6,  y + 48)
      ctx.stroke()
    }
  },

  // EMPTY COIL — a vending machine coil spring, clearly empty (no product)
  {
    w: 34, h: 30,
    draw(ctx, x, y, w, h) {
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)'
      ctx.fillRect(x + 3, y + 4, w, h)
      // top and bottom bars
      ctx.fillStyle = '#92400e'
      ctx.fillRect(x, y, w, 6)
      ctx.fillRect(x, y + h - 6, w, 6)
      // spring coils — zigzag
      ctx.strokeStyle = '#f59e0b'
      ctx.lineWidth = 3
      ctx.lineJoin = 'round'
      ctx.beginPath()
      const steps = 6
      const stepW = w / steps
      ctx.moveTo(x, y + h / 2)
      for (let i = 0; i < steps; i++) {
        const nx = x + (i + 0.5) * stepW
        const ny = (i % 2 === 0) ? y + 8 : y + h - 8
        ctx.lineTo(nx, ny)
      }
      ctx.lineTo(x + w, y + h / 2)
      ctx.stroke()
      // empty slot indicator — dashed outline inside
      ctx.strokeStyle = '#fde68a'
      ctx.lineWidth = 1
      ctx.setLineDash([3, 3])
      ctx.strokeRect(x + 2, y + 2, w - 4, h - 4)
      ctx.setLineDash([])
    }
  },

  // CASH MACHINE — old coin-operated machine (grey/yellow, coin slot, keypad)
  {
    w: 36, h: 54,
    draw(ctx, x, y, w, h) {
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)'
      ctx.fillRect(x + 4, y + 5, w, h)
      // body
      ctx.fillStyle = '#78350f'
      ctx.fillRect(x, y, w, h)
      ctx.fillStyle = '#d97706'
      ctx.fillRect(x, y, w - 4, h - 4)
      // coin tray top
      ctx.fillStyle = '#92400e'
      ctx.fillRect(x + 4, y + 4, w - 12, 5)
      // big coin slot
      ctx.fillStyle = '#1c0f00'
      ctx.fillRect(x + 8, y + 14, w - 20, 5)
      // coin symbol — stack of 3 circles
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = i === 0 ? '#fbbf24' : '#f59e0b'
        ctx.beginPath()
        ctx.ellipse(x + w / 2 - 2, y + 26 + i * 5, 9, 5, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.strokeStyle = '#92400e'
        ctx.lineWidth = 0.5
        ctx.stroke()
      }
      // keypad dots
      ctx.fillStyle = '#92400e'
      for (let r = 0; r < 2; r++) {
        for (let c = 0; c < 3; c++) {
          ctx.beginPath()
          ctx.arc(x + 7 + c * 8, y + 42 + r * 7, 2.5, 0, Math.PI * 2)
          ctx.fill()
        }
      }
    }
  }
]

function spawnObstacle() {
  const t = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)]
  obstacles.push({
    x: W + 20,
    y: GY - t.h,          // ← bottom = GY, same as player.y
    w: t.w,
    h: t.h,
    draw: t.draw
  })
}

// ── Draw ───────────────────────────────────────────────────
function drawBg() {
  STARS.forEach(s => {
    ctx.globalAlpha = 0.25 + 0.25 * Math.sin(frame * 0.04 + s.p)
    ctx.fillStyle = '#94a3b8'
    ctx.beginPath()
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2)
    ctx.fill()
  })
  ctx.globalAlpha = 1
}

function drawGround() {
  // main line
  ctx.fillStyle = '#334155'
  ctx.fillRect(0, GY + 2, W, 3)
  // moving dashes
  ctx.fillStyle = '#1e3a5f'
  const off = (frame * speed * 0.4) % 70
  for (let x = -70 + off; x < W; x += 70) {
    ctx.fillRect(x, GY + 10, 40, 2)
  }
}

function drawPlayer() {
  const p  = player
  const ty = p.y - p.h          // top of player
  const bx = p.grounded ? Math.sin(frame * 0.25) * 1.2 : 0

  // shadow
  ctx.globalAlpha = 0.2
  ctx.fillStyle = '#000'
  ctx.fillRect(p.x + 4, p.y + 2, p.w, 6)
  ctx.globalAlpha = 1

  // body dark
  ctx.fillStyle = '#059669'
  ctx.fillRect(p.x + 2, ty + bx + 3, p.w, p.h)
  // body main
  ctx.fillStyle = '#10b981'
  ctx.fillRect(p.x, ty + bx, p.w, p.h)

  // screen
  ctx.fillStyle = '#0f172a'
  ctx.fillRect(p.x + 5, ty + bx + 5, p.w - 10, 13)
  ctx.fillStyle = `hsl(${(frame * 4) % 360}, 90%, 65%)`
  ctx.globalAlpha = 0.5
  ctx.fillRect(p.x + 6, ty + bx + 6, p.w - 12, 11)
  ctx.globalAlpha = 1

  // coin slot
  ctx.fillStyle = '#065f46'
  ctx.fillRect(p.x + 8, ty + bx + 24, p.w - 16, 3)

  // buttons
  ctx.fillStyle = '#34d399'
  ctx.fillRect(p.x + 5, ty + bx + 32, 9, 6)
  ctx.fillStyle = '#60a5fa'
  ctx.fillRect(p.x + 18, ty + bx + 32, 9, 6)

  // VMflow text
  ctx.fillStyle = '#064e3b'
  ctx.font      = 'bold 6px Courier New'
  ctx.textAlign = 'center'
  ctx.fillText('VM', p.x + p.w / 2, ty + bx + p.h - 6)

  // wheels
  const wy = p.y + bx
  ;[[p.x + 7, wy], [p.x + p.w - 7, wy]].forEach(([cx, cy]) => {
    ctx.fillStyle = '#1e293b'
    ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill()
    ctx.fillStyle = '#475569'
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill()
    ctx.fillStyle = '#94a3b8'
    ctx.beginPath(); ctx.arc(cx, cy, 1, 0, Math.PI * 2); ctx.fill()
  })
}

function drawHUD() {
  ctx.fillStyle = '#10b981'
  ctx.font = 'bold 15px Courier New'
  ctx.textAlign = 'right'
  ctx.fillText(Math.floor(score).toString().padStart(6, '0') + ' CR', W - 14, 26)
  ctx.fillStyle = '#334155'
  ctx.font = '10px Courier New'
  ctx.fillText('BEST ' + best.toString().padStart(6, '0'), W - 14, 42)
}

function drawOverlay(title, titleColor, lines) {
  ctx.fillStyle = 'rgba(15,23,42,0.82)'
  ctx.beginPath()
  ctx.roundRect(W / 2 - 180, H / 2 - 58, 360, 116, 10)
  ctx.fill()
  ctx.strokeStyle = '#334155'
  ctx.lineWidth = 1.5
  ctx.stroke()

  ctx.fillStyle = titleColor
  ctx.font = 'bold 19px Courier New'
  ctx.textAlign = 'center'
  ctx.fillText(title, W / 2, H / 2 - 28)

  lines.forEach((l, i) => {
    ctx.fillStyle = i === 0 ? '#e2e8f0' : '#64748b'
    ctx.font = (i === 0 ? '12px' : '10px') + ' Courier New'
    ctx.fillText(l, W / 2, H / 2 - 4 + i * 18)
  })
}

// ── Collision (AABB) ───────────────────────────────────────
// Player rect: x, y-h, w, h  (y is bottom)
// Obstacle rect: x, y, w, h  (y is top)
function collides(p, o) {
  const m = 5
  return (
    p.x + m         < o.x + o.w - m &&
    p.x + p.w - m   > o.x + m       &&
    p.y - p.h + m   < o.y + o.h - m &&
    p.y - m         > o.y + m
  )
}

// ── Input ──────────────────────────────────────────────────
function jump() {
  if (state === 'idle' || state === 'over') {
    init()
    state = 'running'
    return
  }
  if (player.jumps < 2) {
    player.vy = JUMP_V
    player.grounded = false
    player.jumps++
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump() }
})
canvas.addEventListener('click', jump)
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump() }, { passive: false })

// ── Loop ───────────────────────────────────────────────────
function update() {
  frame++  // always increment for animations

  if (state !== 'running') return

  score += speed * 0.05
  speed  = Math.min(MAX_SPD, MIN_SPD + score * 0.008)

  // physics
  player.vy += GRAVITY
  player.y  += player.vy
  if (player.y >= GY) {
    player.y = GY; player.vy = 0; player.grounded = true; player.jumps = 0
  }

  // spawn
  if (--nextObstacle <= 0) {
    spawnObstacle()
    nextObstacle = randomDelay()
  }

  obstacles.forEach(o => o.x -= speed)
  obstacles = obstacles.filter(o => o.x + o.w > -20)

  // collision
  for (const o of obstacles) {
    if (collides(player, o)) {
      state = 'over'
      const s = Math.floor(score)
      if (s > best) { best = s; localStorage.setItem('vmflow_best', best) }
      return
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H)
  drawBg()
  drawGround()
  obstacles.forEach(o => o.draw(ctx, o.x, o.y, o.w, o.h))
  drawPlayer()
  drawHUD()
  if (state === 'idle') drawOverlay('VMflow Runner', '#10b981', [
    'SPACE or TAP to start',
    'Avoid: broken machines · empty coils · old cash machines',
    'Double jump allowed'
  ])
  if (state === 'over') drawOverlay('SYSTEM CRASH', '#ef4444', [
    `Credits collected: ${Math.floor(score)}`,
    'SPACE or TAP to restart'
  ])
}

const FRAME_MS = 1000 / 60
let lastTs = 0
let paused = false

function loop(ts) {
  requestAnimationFrame(loop)
  if (paused) return
  const delta = ts - lastTs
  if (delta < FRAME_MS) return
  lastTs = ts - (delta % FRAME_MS)
  update()
  draw()
}

document.addEventListener('visibilitychange', () => {
  paused = document.hidden
  if (!paused) lastTs = performance.now()
})

init()
requestAnimationFrame(loop)
</script>
</body>
</html>
