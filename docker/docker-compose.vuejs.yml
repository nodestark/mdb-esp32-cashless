name: vmflow-vuejs

services:
  vue-dev:
    image: node:lts-alpine
    ports:
      - "5173:5173"
    volumes:
      - ./vuejs:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"

  vue-prod:
    image: node:lts-alpine
    volumes:
      - ./vuejs:/app
      - vue_dist:/app/dist
    working_dir: /app
    command: sh -c "npm run build"

  vue-nginx:
    image: nginx:stable-alpine
    ports:
      - "5173:5173"
    volumes:
      - vue_dist:/usr/share/nginx/html
      - ./vuejs/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - vue-prod
    restart: unless-stopped

volumes:
  vue_dist: