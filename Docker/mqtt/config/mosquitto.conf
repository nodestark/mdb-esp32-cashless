# Define a porta padrão
listener 1883

# Habilita a persistência de mensagens
persistence true
persistence_location /mosquitto/data

# Persistent sessions: queue up to 1000 QoS 1+ messages per offline client.
# Sessions expire after 1 hour of inactivity (forwarder restart/deploy grace).
max_queued_messages 1000
max_inflight_messages 20
persistent_client_expiration 1h

# Diretório para logs
#log_dest file /mosquitto/log/mosquitto.log

# Usuários e senhas (opcional)
password_file /mosquitto/config/passwd
allow_anonymous true

