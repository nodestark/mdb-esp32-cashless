# TCP listener (devices, forwarder)
listener 1883

# WebSocket listener (edge functions — edge runtime blocks raw TCP)
listener 9001
protocol websockets

# Persistence: queue up to 1000 QoS 1+ messages per offline client.
# Sessions expire after 1 hour of inactivity (forwarder restart/deploy grace).
persistence true
persistence_location /mosquitto/data
max_queued_messages 1000
max_inflight_messages 20
persistent_client_expiration 1h

# Authentication & Authorization
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

