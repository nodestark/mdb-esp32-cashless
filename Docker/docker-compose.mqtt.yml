name: vmflow-mqtt

services:
  broker:
    image: eclipse-mosquitto:2.1.2-alpine
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT (TCP)
      - "9001:9001"   # WebSockets (opcional)
    volumes:
      - ./mqtt/config:/mosquitto/config
      - ./mqtt/config/acl:/etc/mosquitto/acl
      - ./mqtt/data:/mosquitto/data

  domain:
    build:
      context: ./mqtt/forwarder
    restart: unless-stopped
    depends_on:
      - broker
    environment:
      MQTT_HOST: broker
      SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      MQTT_WEBHOOK_SECRET: ${MQTT_WEBHOOK_SECRET}
